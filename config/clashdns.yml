mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
keep-alive-interval: 30
keep-alive-idle: 60
disable-keep-alive: true
unified-delay: true
global-client-fingerprint: firefox
geodata-mode: false
geodata-loader: memconservative
tcp-concurrent: true


geoip: >-
    https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat
geosite: >-
    https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
mmdb: >-
    https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
asn: >-
    https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb


dns:
  enable: true
  cache-algorithm: arc
  ipv6: false
  listen: 0.0.0.0:1053
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  respect-rules: true
  fake-ip-ttl: 60
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [tcp://119.29.29.29, tcp://223.5.5.5]
  nameserver: [tls://223.6.6.6, tls://120.53.53.53, tls://223.5.5.5]
  proxy-server-nameserver: [tls://223.6.6.6, tls://120.53.53.53, tls://223.5.5.5]
  nameserver-policy:
    'geosite:cn,private': [tls://223.6.6.6, tls://120.53.53.53, tls://223.5.5.5]
    '+.*': [tcp://8.8.8.8, tcp://1.1.1.1]


sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 1024-65535]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

rule-providers:
    BanAD:
      type: http
      format: mrs
      behavior: domain                        
      url: https://raw.githubusercontent.com/Filterrr/AdBlock_Rule_For_Clash/main/adblock_reject.mrs
      path: ./adblock_reject.mrs
      interval: 864000

      
